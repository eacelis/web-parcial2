services:
  db:
    image: postgres:16-alpine
    container_name: library-loans-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-loans}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loans}
      POSTGRES_DB: ${DB_NAME:-loans}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - library_loans_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-loans} -d ${DB_NAME:-loans}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  library_loans_pgdata:
